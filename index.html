<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BCR GenZ Assistant</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.chat-container{
width:420px;
background:white;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.15);
overflow:hidden;
}

.header{
background:#e30613;
color:white;
padding:20px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.messages{
padding:20px;
height:350px;
overflow-y:auto;
}

.bot{
background:#f1f1f1;
padding:12px;
border-radius:12px;
margin-bottom:15px;
}

.buttons{
display:flex;
flex-wrap:wrap;
gap:10px;
padding:15px;
}

button{
background:#e30613;
color:white;
border:none;
padding:10px 15px;
border-radius:10px;
cursor:pointer;
}

button:hover{
background:#c8000f;
}

</style>
</head>

<body>

<div class="chat-container">

<div class="header">
🚀 BCR GenZ Assistant
</div>

<div class="messages" id="chat">

<div class="bot">
Salut! Sunt BCR GenZ Assistant.

Cu ce te pot ajuta?
</div>

</div>

<div class="buttons">

<button onclick="answer('ambassador')">
🌟 Ambasadori
</button>

<button onclick="answer('george')">
💳 George
</button>

<button onclick="answer('internship')">
🚀 Internshipuri
</button>

<button onclick="answer('events')">
🎓 Evenimente
</button>

</div>

</div>

<script>

function answer(type){

let text = "";

if(type==="ambassador"){
text="Programul BCR Gen Z Ambassadors este dedicat studentilor care doresc sa reprezinte BCR in campus.";
}

if(type==="george"){
text="George este platforma digitala de banking dezvoltata de BCR.";
}

if(type==="internship"){
text="BCR organizeaza programe de internship si oportunitati pentru studenti si absolventi.";
}

if(type==="events"){
text="Evenimentele includ activari Back to School, workshop-uri si sesiuni de networking.";
}

document.getElementById("chat").innerHTML +=
'<div class="bot">'+text+'</div>';

}

</script>

</body>
</html>
