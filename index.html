<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BCR GenZ Assistant</title>

<style>

body{
background:#f5f5f5;
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
background:white;
width:450px;
padding:30px;
border-radius:20px;
box-shadow:0 6px 25px rgba(0,0,0,0.15);
text-align:center;
}

h1{
color:#e30613;
}

button{
background:#e30613;
color:white;
border:none;
padding:12px;
margin:5px;
border-radius:10px;
cursor:pointer;
}

#answer{
margin-top:20px;
padding:15px;
background:#f3f3f3;
border-radius:10px;
}

</style>
</head>

<body>

<div class="card">

<h1>🚀 BCR GenZ Assistant</h1>

<p>Alege o întrebare:</p>

<button onclick="showAnswer('ambassador')">
🌟 Ambasadori
</button>

<button onclick="showAnswer('george')">
💳 George
</button>

<button onclick="showAnswer('internship')">
🚀 Internship
</button>

<button onclick="showAnswer('events')">
🎓 Evenimente
</button>

<div id="answer">
Salut! Sunt BCR GenZ Assistant.
</div>

</div>

<script>

function showAnswer(topic){

let text="";

if(topic==="ambassador"){
text="Programul BCR Gen Z Ambassadors este dedicat studentilor care vor sa reprezinte BCR in campus.";
}

if(topic==="george"){
text="George este platforma digitala de banking dezvoltata de BCR.";
}

if(topic==="internship"){
text="BCR ofera programe de internship si oportunitati de cariera pentru studenti.";
}

if(topic==="events"){
text="Evenimentele includ Back to School, networking si workshop-uri.";
}

document.getElementById("answer").innerHTML=text;

}

</script>

</body>
</html>
