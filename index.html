<!DOCTYPE html>
<html lang="ro">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BCR GenZ Assistant</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.chat-container{
width:500px;
height:700px;
background:white;
border-radius:20px;
overflow:hidden;
box-shadow:0 8px 30px rgba(0,0,0,0.15);
display:flex;
flex-direction:column;
}

.header{
background:#e30613;
color:white;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.chat{
flex:1;
padding:20px;
overflow-y:auto;
}

.user{
background:#e30613;
color:white;
padding:12px;
border-radius:15px;
margin-bottom:10px;
margin-left:50px;
}

.bot{
background:#eeeeee;
padding:12px;
border-radius:15px;
margin-bottom:10px;
margin-right:50px;
}

.input-area{
display:flex;
padding:15px;
gap:10px;
border-top:1px solid #ddd;
}

input{
flex:1;
padding:12px;
border-radius:10px;
border:1px solid #ccc;
}

button{
background:#e30613;
color:white;
border:none;
padding:12px 18px;
border-radius:10px;
cursor:pointer;
}

button:hover{
background:#c00010;
}

</style>

</head>

<body>

<div class="chat-container">

<div class="header">
🚀 BCR GenZ Assistant
</div>

<div class="chat" id="chat">

<div class="bot">
Salut! Sunt BCR GenZ Assistant. Cum te pot ajuta?
</div>

</div>

<div class="input-area">

<input
id="userInput"
placeholder="Scrie întrebarea ta...">

<button onclick="sendMessage()">
Trimite
</button>

</div>

</div>

<script>

function sendMessage(){

let input =
document.getElementById("userInput");

let question =
input.value;

if(question===""){
return;
}

document.getElementById("chat").innerHTML +=
`<div class="user">${question}</div>`;

let q =
question.toLowerCase();

let response="";

if(q.includes("george")){
response=
"George este platforma digitală de banking a BCR.";
}

else if(q.includes("ambasador")){
response=
"Programul BCR Gen Z Ambassadors este dedicat studenților care vor să reprezinte BCR în campus.";
}

else if(q.includes("internship")){
response=
"BCR oferă oportunități de internship și dezvoltare pentru studenți.";
}

else if(q.includes("eveniment")){
response=
"BCR organizează activări Back To School, workshop-uri și evenimente de networking.";
}

else{
response=
"Momentan pot răspunde la întrebări despre George, internshipuri, ambasadori și evenimente.";
}

document.getElementById("chat").innerHTML +=
`<div class="bot">${response}</div>`;

input.value="";

}

</script>

</body>

</html>
