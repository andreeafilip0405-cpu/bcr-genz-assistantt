<!DOCTYPE html>
<html lang="ro">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BCR GenZ Assistant</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .chat-container {
      width: 420px;
      background: white;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 5px 20px rgba(0,0,0,0.15);
    }

    .header {
      background: #e30613;
      color: white;
      padding: 20px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
    }

    .messages {
      padding: 20px;
      min-height: 250px;
    }

    .message {
      background: #f1f1f1;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .buttons {
      padding: 15px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    button {
      background: #e30613;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 10px;
      cursor: pointer;
    }

    button:hover {
      background: #c00010;
    }
  </style>
</head>

<body>

  <div class="chat-container">

    <div class="header">
      🚀 BCR GenZ Assistant
    </div>

    <div class="messages" id="chat">
      <div class="message">
        Salut! Sunt BCR GenZ Assistant. Cu ce te pot ajuta?
      </div>
    </div>

    <div class="buttons">
      <button onclick="answer('ambassador')">🌟 Ambasadori</button>
      <button onclick="answer('george')">💳 George</button>
      <button onclick="answer('internship')">🚀 Internshipuri</button>
      <button onclick="answer('events')">🎓 Evenimente</button>
    </div>

  </div>

  <script>
    function answer(type) {

      let text = "";

      if(type === "ambassador"){
        text = "Programul BCR Gen Z Ambassadors este dedicat studentilor care doresc sa reprezinte BCR in campus.";
      }

      if(type === "george"){
        text = "George este platforma digitala de banking a BCR.";
      }

      if(type === "internship"){
        text = "BCR ofera programe de internship si oportunitati pentru studenti.";
      }

      if(type === "events"){
        text = "Evenimentele includ activari Back to School, workshop-uri si networking.";
      }

      document.getElementById("chat").innerHTML +=
      `<div class="message">${text}</div>`;
    }
  </script>

</body>

</html>
