<!DOCTYPE html>
<html lang="ro">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BCR GenZ Assistant</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.chat-container{
width:500px;
height:700px;
background:white;
border-radius:20px;
overflow:hidden;
box-shadow:0 8px 30px rgba(0,0,0,0.15);
display:flex;
flex-direction:column;
}

.header{
background:#e30613;
color:white;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.chat{
flex:1;
padding:20px;
overflow-y:auto;
background:#fafafa;
}

.user{
background:#e30613;
color:white;
padding:12px;
border-radius:15px;
margin-bottom:10px;
margin-left:60px;
text-align:left;
}

.bot{
background:#eeeeee;
padding:12px;
border-radius:15px;
margin-bottom:10px;
margin-right:60px;
text-align:left;
}

.input-area{
display:flex;
padding:15px;
gap:10px;
border-top:1px solid #ddd;
background:white;
}

input{
flex:1;
padding:12px;
border-radius:10px;
border:1px solid #ccc;
font-size:15px;
}

button{
background:#e30613;
color:white;
border:none;
padding:12px 18px;
border-radius:10px;
cursor:pointer;
font-size:14px;
}

button:hover{
background:#c00010;
}

</style>

</head>

<body>

<div class="chat-container">

<div class="header">
🚀 BCR GenZ Assistant
</div>

<div class="chat" id="chat">

<div class="bot">
Salut! Sunt BCR GenZ Assistant. 👋

Te pot ajuta cu:

✅ George

✅ Programul Gen Z Ambassadors

✅ Internshipuri BCR

✅ Evenimente pentru studenți
</div>

</div>

<div class="input-area">

<input
id="userInput"
placeholder="Scrie întrebarea ta...">

<button onclick="sendMessage()">
Trimite
</button>

</div>

</div>

<script>

function sendMessage(){

let input =
document.getElementById("userInput");

let question =
input.value;

if(question===""){
return;
}

let chat =
document.getElementById("chat");

chat.innerHTML +=
`<div class="user">${question}</div>`;

input.value="";

chat.innerHTML +=
`<div class="bot" id="typing">
🤖 GenZ Assistant scrie...
</div>`;

let q =
question.toLowerCase();

let response="";

if(
q.includes("george") ||
q.includes("cont") ||
q.includes("card")
){
response=
"George este platforma digitală de banking a BCR unde poți gestiona conturi, carduri și plăți.";
}

else if(
q.includes("ambasador")
){
response=
"Programul BCR Gen Z Ambassadors este destinat studenților care vor să reprezinte BCR în universități și să organizeze activări în campus.";
}

else if(
q.includes("internship")
){
response=
"BCR oferă oportunități de internship și dezvoltare profesională pentru studenți și absolvenți.";
}

else if(
q.includes("eveniment")
){
response=
"BCR organizează activări Back To School, workshop-uri, networking și evenimente pentru studenți.";
}

else if(
q.includes("beneficii")
){
response=
"Ambasadorii pot primi training-uri, networking, experiență practică, mentorat și acces la evenimente exclusive.";
}

else{
response=
"Încă sunt în dezvoltare. Momentan pot răspunde la întrebări despre George, BCR Gen Z Ambassadors, Internshipuri și Evenimente.";
}

setTimeout(function(){

let typing =
document.getElementById("typing");

if(typing){
typing.remove();
}

chat.innerHTML +=
`<div class="bot">${response}</div>`;

chat.scrollTop =
chat.scrollHeight;

},1000);

}

document
.getElementById("userInput")
.addEventListener(
"keypress",
function(event){

if(event.key==="Enter"){
sendMessage();
}

});

</script>

</body>

</html>
